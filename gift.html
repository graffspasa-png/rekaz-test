<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>GRAFF SPA — بطاقة الإهداء</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&family=Cormorant+Garamond:wght@300;400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--gold:#b8965a;--ink:#080807;--cream:#f5efe4}
body{font-family:'Tajawal',sans-serif;background:var(--ink);color:var(--cream);line-height:1.6}
.nav{height:70px;background:rgba(8,8,7,.9);display:flex;align-items:center;padding:0 24px;border-bottom:1px solid rgba(184,150,90,.1)}
.logo{font-family:'Cormorant Garamond',serif;font-size:24px;color:var(--gold);text-decoration:none}
.main{padding:40px 20px;max-width:1000px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:40px}
@media(max-width:800px){.main{grid-template-columns:1fr}}
canvas{width:100%;background:#141210;border:1px solid var(--gold)}
.form-side{background:#0b0908;padding:30px;border:1px solid rgba(184,150,90,.1)}
h1{color:var(--gold);margin-bottom:20px}
.amounts{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:20px 0}
.amt-btn{background:transparent;border:1px solid var(--gold);color:#fff;padding:10px;cursor:pointer}
.amt-btn.active{background:var(--gold);color:var(--ink)}
input{width:100%;padding:12px;margin-bottom:10px;background:#1a1714;border:1px solid #333;color:#fff}
.btn-primary{width:100%;background:var(--gold);padding:15px;border:none;font-weight:700;cursor:pointer}
#ntf{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--gold);color:var(--ink);padding:10px 20px;opacity:0;transition:0.3s}
</style>
</head>
<body>
<div id="ntf">جاري المعالجة...</div>
<nav class="nav"><a href="/" class="logo">GRAFF SPA</a></nav>
<div class="main">
  <div><canvas id="cv" width="600" height="800"></canvas></div>
  <div class="form-side">
    <h1>بطاقة الإهداء</h1>
    <div class="amounts">
      <button class="amt-btn active" onclick="setAmt(500,this)">500</button>
      <button class="amt-btn" onclick="setAmt(1000,this)">1000</button>
      <button class="amt-btn" onclick="setAmt(2000,this)">2000</button>
    </div>
    <input type="text" placeholder="اسم المستلم" oninput="upd('tn',this.value)">
    <input type="tel" placeholder="رقم جوال المستلم" oninput="upd('p',this.value)">
    <input type="text" placeholder="اسمك الكريم" oninput="upd('fn',this.value)">
    <button class="btn-primary" onclick="downloadCard()">إرسال الإهداء والدفع</button>
  </div>
</div>
<script>
const ge=id=>document.getElementById(id);
const S={v:500,tn:'',fn:'',p:''};
const cv=ge('cv'),x=cv.getContext('2d');
const img=new Image();
img.crossOrigin="anonymous";
img.src='https://i.ibb.co/S7X7YfLh/6.png';
img.onload=draw;
function setAmt(v,el){S.v=v;document.querySelectorAll('.amt-btn').forEach(b=>b.classList.remove('active'));el.classList.add('active');draw();}
function upd(k,v){S[k]=v;draw();}
function draw(){
  x.drawImage(img,0,0,600,800);
  x.textAlign='center';x.fillStyle='#1a1714';x.font='40px Tajawal';
  if(S.tn)x.fillText(S.tn,300,420);
  x.fillStyle='#b8965a';x.font='30px Tajawal';
  x.fillText(S.v+' SAR',300,600);
}
async function downloadCard(){
  if(!S.fn||!S.tn||!S.p){alert('أكمل البيانات');return;}
  const btn=document.querySelector('.btn-primary');
  btn.disabled=true; btn.innerHTML='جاري التحميل...';
  try{
    const res=await fetch('/api/purchase-gift',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({amount:S.v,senderName:S.fn,recipientName:S.tn,recipientPhone:S.p})
    });
    const data=await res.json();
    if(data.success && data.paymentLink){
      cv.toBlob(b=>{
        const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='Gift.png';a.click();
      });
      window.location.href=data.paymentLink;
    }else{alert('خطأ في ركاز');}
  }catch(e){alert('خطأ اتصال');}
  btn.disabled=false; btn.innerHTML='إرسال الإهداء والدفع';
}
</script>
</body>
</html>
